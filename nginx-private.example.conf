events {}

http {
    # Log the path without query strings so credentials passed by legacy admin
    # endpoints are not written to access logs.
    log_format private_gate '$remote_addr client="$http_cf_connecting_ip" '
                            '"$request_method $uri $server_protocol" $status "$http_user_agent"';

    map $http_upgrade $connection_upgrade {
        default upgrade;
        "" close;
    }

    # Replace these documentation ranges with your own operator IP ranges.
    # If you are not behind Cloudflare, use $remote_addr instead.
    geo $http_cf_connecting_ip $private_allowed {
        default 0;
        203.0.113.10/32 1;
        2001:db8:1234::/64 1;
    }

    server {
        listen 8080;
        server_name _;
        access_log /var/log/nginx/access.log private_gate;

        if ($private_allowed = 0) {
            return 403;
        }

        location = /mihomo {
            return 301 /mihomo/;
        }

        location /mihomo/ {
            alias /usr/share/nginx/html/mihomo/;
            try_files $uri $uri/ /mihomo/index.html;
        }

        location /mihomo-api/ {
            proxy_pass http://mihomo:9090/;
            proxy_http_version 1.1;
            proxy_set_header Authorization "Bearer REPLACE_WITH_MIHOMO_SECRET";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        location / {
            proxy_pass http://grok2api:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
